<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Simple Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5 text-center">
        
        <h1 class="display-4 text-primary">Welcome to My Webpage</h1>
        
        <p class="lead mt-3">
            This is a simple paragraph styled with Bootstrap classes. It is responsive and centers itself within the container.
        </p>

        <div class="mt-4">
            <button type="button" class="btn btn-primary btn-lg px-4 gap-3">
                Click Me!
            </button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
