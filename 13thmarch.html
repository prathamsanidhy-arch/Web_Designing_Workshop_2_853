<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Puma Navbar</title>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

.top-banner{
background:#f5f5f5;
text-align:center;
padding:10px;
font-size:14px;
letter-spacing:1px;
}

.navbar{
background:black;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
}

.logo img{
height:25px;
filter:invert(1);
}

.nav-links{
display:flex;
list-style:none;
gap:30px;
font-size:15px;
}

.nav-links li{
cursor:pointer;
}

.nav-links li:hover{
color:gray;
}

.nav-icons{
display:flex;
align-items:center;
gap:20px;
}

.search-box{
display:flex;
align-items:center;
border:1px solid white;
padding:5px 10px;
gap:8px;
}

.search-box input{
background:transparent;
border:none;
outline:none;
color:white;
width:120px;
}

.nav-icons i{
cursor:pointer;
font-size:18px;
}

</style>

</head>

<body>

<div class="top-banner">
EXTRA 5% OFF AND FREE SHIPPING ON ALL ONLINE PAYMENTS*
</div>

<nav class="navbar">

<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/da/Puma_complete_logo.svg/2560px-Puma_complete_logo.svg.png">
</div>

<ul class="nav-links">
<li>New</li>
<li>Sports</li>
<li>Men</li>
<li>Women</li>
<li>Motorsport</li>
<li>Lifestyle</li>
<li>Kids</li>
<li>Sale</li>
</ul>

<div class="nav-icons">

<div class="search-box">
<i class="fa fa-search"></i>
<input type="text" placeholder="SEARCH">
</div>

<i class="fa-regular fa-heart"></i>
<i class="fa-solid fa-bag-shopping"></i>
<i class="fa-regular fa-user"></i>

</div>

</nav>

</body>
</html>
